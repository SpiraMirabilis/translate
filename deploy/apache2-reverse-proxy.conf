# Apache2 reverse proxy for T9
#
# Prerequisites:
#   sudo a2enmod proxy proxy_http proxy_wstunnel ssl rewrite headers
#   sudo a2ensite t9.conf
#   sudo systemctl reload apache2
#
# SSL: This example assumes Let's Encrypt via certbot.
#   sudo certbot --apache -d t9.example.com

<VirtualHost *:80>
    ServerName t9.example.com
    RewriteEngine On
    RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [R=301,L]
</VirtualHost>

<VirtualHost *:443>
    ServerName t9.example.com

    SSLEngine on
    SSLCertificateFile    /etc/letsencrypt/live/t9.example.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/t9.example.com/privkey.pem

    # WebSocket upgrade
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/ws$ ws://127.0.0.1:8000/ws [P,L]

    # Proxy everything else
    ProxyPreserveHost On
    ProxyPass        / http://127.0.0.1:8000/
    ProxyPassReverse / http://127.0.0.1:8000/

    # Pass auth cookies through
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-For "%{REMOTE_ADDR}s"
</VirtualHost>
