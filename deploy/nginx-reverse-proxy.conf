# Nginx reverse proxy for T9
#
# Install:
#   sudo cp deploy/nginx-reverse-proxy.conf /etc/nginx/sites-available/t9
#   sudo ln -s /etc/nginx/sites-available/t9 /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL: This example assumes Let's Encrypt via certbot.
#   sudo certbot --nginx -d t9.example.com

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name t9.example.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name t9.example.com;

    ssl_certificate     /etc/letsencrypt/live/t9.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/t9.example.com/privkey.pem;

    # WebSocket support
    location /ws {
        proxy_pass http://127.0.0.1:8000/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Keep WebSocket alive during long entity review waits
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Everything else
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Translation uploads can be large
        client_max_body_size 50m;
    }
}
